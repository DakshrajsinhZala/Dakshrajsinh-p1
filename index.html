<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardSafe | Password Analyzer</title>
    <link rel="stylesheet" href="file.css">
    <!-- Google Fonts for a professional look -->
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap)" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>GuardSafe</h1>
            <p>Check your password strength instantly.</p>
        </header>

        <div class="card">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter your password..." spellcheck="false">
                <button id="toggleBtn" type="button">Show</button>
            </div>

            <div class="strength-meter">
                <div id="strengthBar" class="bar"></div>
            </div>

            <div id="feedbackText" class="feedback">Start typing to see strength...</div>

            <ul class="requirements">
                <li id="length" class="invalid">At least 8 characters</li>
                <li id="upper" class="invalid">Uppercase & lowercase letters</li>
                <li id="number" class="invalid">At least one number</li>
                <li id="special" class="invalid">At least one special character</li>
            </ul>
        </div>
    </div>
    <script src="file.js"></script>
</body>
</html>
